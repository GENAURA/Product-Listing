<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeVector Product Browser</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container py-4">

    <h1 class="text-center mb-4">
        🛍️ CodeVector Product Browser
    </h1>

    <div class="row g-3 mb-4">

        <div class="col-md-4">
            <select id="category" class="form-select">
                <option value="">All Categories</option>
            </select>
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100" onclick="loadProducts()">
                Apply Filter
            </button>
        </div>

        <div class="col-md-2">
            <button class="btn btn-secondary w-100" onclick="resetFilter()">
                Reset
            </button>
        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <table class="table table-hover align-middle">

                <thead>

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                </tr>

                </thead>

                <tbody id="productTable"></tbody>

            </table>

        </div>

    </div>

    <div class="d-flex justify-content-between mt-3">

        <button id="nextBtn" class="btn btn-success">
            Next Page →
        </button>

    </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
